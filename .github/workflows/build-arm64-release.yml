name: Build & Upload ARM64 Docker Image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Image tag version (e.g. v6.6.4)'
        required: true
        default: 'v6.6.4'

env:
  BUILD_DIR: v6.6.4__latest__in_docker__install
  DOCKERFILE: v6.6.4__latest__in_docker__install/Dockerfile

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Symlink Chinese dir to ASCII name
        run: |
          ln -s "v6.6.4（最新版请在docker安装）" "$BUILD_DIR"
          ls -la "$BUILD_DIR/Dockerfile"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Build ARM64 Docker image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --tag ghcr.io/asice999/tgtodrive:latest \
            --tag ghcr.io/asice999/tgtodrive:${{ steps.version.outputs.tag }} \
            --load \
            -f "$DOCKERFILE" \
            "$BUILD_DIR"

      - name: Push to ghcr.io
        if: github.event_name == 'release'
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          if [ -z "$GHCR_PAT" ]; then
            echo "⚠️  GHCR_PAT not set — skipping push to ghcr.io"
            echo "   Set it in Settings → Secrets → Actions:"
            echo "   Create PAT at https://github.com/settings/tokens with write:packages scope"
            exit 0
          fi
          echo "$GHCR_PAT" | docker login ghcr.io -u asice999 --password-stdin
          docker push ghcr.io/asice999/tgtodrive:${{ steps.version.outputs.tag }}
          docker push ghcr.io/asice999/tgtodrive:latest

      - name: Save image as tar.gz
        run: |
          docker save ghcr.io/asice999/tgtodrive:latest | gzip > TgtoDrive_${{ steps.version.outputs.tag }}_arm64.tar.gz
          ls -lh TgtoDrive_*.tar.gz

      - name: Upload to Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GHCR_PAT }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            TgtoDrive_${{ steps.version.outputs.tag }}_arm64.tar.gz \
            --clobber

      - name: Upload as workflow artifact (for workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: TgtoDrive_${{ steps.version.outputs.tag }}_arm64
          path: TgtoDrive_${{ steps.version.outputs.tag }}_arm64.tar.gz
          retention-days: 7