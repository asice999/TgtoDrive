name: Build & Release ARM64 Docker Image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: '镜像版本号 (e.g. v6.6.4)'
        required: true
        default: 'v6.6.4'

env:
  BUILD_DIR: v6.6.4__latest__in_docker__install
  DOCKERFILE: v6.6.4__latest__in_docker__install/Dockerfile
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/tgtodrive

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Symlink Chinese dir to ASCII name
        run: |
          ln -s "v6.6.4（最新版请在docker安装）" "$BUILD_DIR"
          ls -la "$BUILD_DIR/Dockerfile"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Build ARM64 Docker image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --tag ${{ env.IMAGE_NAME }}:latest \
            --tag ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }} \
            --load \
            -f "$DOCKERFILE" \
            "$BUILD_DIR"

      - name: Push to GitHub Container Registry
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GHCR_TOKEN" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
          docker push ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
          docker push ${{ env.IMAGE_NAME }}:latest

      - name: Save image as tar.gz
        run: |
          docker save ${{ env.IMAGE_NAME }}:latest | gzip > TgtoDrive_${{ steps.version.outputs.tag }}_arm64.tar.gz
          ls -lh TgtoDrive_*.tar.gz

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: TgtoDrive_${{ steps.version.outputs.tag }}_arm64
          path: TgtoDrive_${{ steps.version.outputs.tag }}_arm64.tar.gz
          retention-days: 7

      - name: Create Release (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          cat > /tmp/release-notes.md <<-EOF
          ARM64 Docker image build for $TAG

          - 多阶段构建，体积优化
          - 平台: linux/arm64
          - 使用方式: \`docker pull ${{ env.IMAGE_NAME }}:$TAG\`
          EOF
          gh release create "$TAG" \
            --title "TgtoDrive $TAG (ARM64)" \
            --notes-file /tmp/release-notes.md \
            --target "${{ github.sha }}" \
            TgtoDrive_*.tar.gz || echo "Release may already exist"

      - name: Upload to Release (published release)
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            TgtoDrive_*.tar.gz \
            --clobber || echo "Upload skipped"